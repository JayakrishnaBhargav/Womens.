<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EmpowerHer Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(135deg,#020617,#0f172a,#1e1b4b);
color:white;

}

.login-container{

width:380px;

background:rgba(255,255,255,0.05);

padding:40px;

border-radius:20px;

backdrop-filter:blur(15px);

box-shadow:0 0 30px rgba(0,0,0,0.6);

animation:fade 1.5s;

}

h1{

text-align:center;
margin-bottom:10px;
color:#a855f7;

}

.subtitle{

text-align:center;
color:#ccc;
margin-bottom:25px;

}

.google-btn{

width:100%;

padding:12px;

border:none;

border-radius:8px;

background:white;
color:black;

display:flex;
align-items:center;
justify-content:center;

gap:10px;

cursor:pointer;

font-weight:bold;

transition:0.3s;

}

.google-btn:hover{

transform:scale(1.05);

}

.divider{

margin:20px 0;

text-align:center;

color:#aaa;

position:relative;

}

.divider::before,
.divider::after{

content:"";

position:absolute;

top:50%;

width:40%;

height:1px;

background:#555;

}

.divider::before{
left:0;
}

.divider::after{
right:0;
}

.tabs{

display:flex;

margin-bottom:20px;

}

.tab{

flex:1;

text-align:center;

padding:10px;

cursor:pointer;

background:#111827;

transition:0.3s;

}

.tab.active{

background:#6366f1;

}

input{

width:100%;

padding:12px;

margin:10px 0;

border:none;

border-radius:8px;

background:#020617;

color:white;

}

button.login{

width:100%;

padding:12px;

border:none;

border-radius:8px;

background:linear-gradient(45deg,#6366f1,#a855f7);

color:white;

font-weight:bold;

cursor:pointer;

transition:0.3s;

}

button.login:hover{

transform:scale(1.05);

box-shadow:0 0 15px #a855f7;

}

.signup{

margin-top:15px;

text-align:center;

font-size:14px;

}

.signup a{

color:#a855f7;

text-decoration:none;

}

.hidden{

display:none;

}

@keyframes fade{

from{

opacity:0;

transform:translateY(20px);

}

to{

opacity:1;

transform:translateY(0);

}

}

</style>
</head>

<body>

<div class="login-container">

<h1>EmpowerHer</h1>

<p class="subtitle">Secure Login Portal</p>

<button class="google-btn">

<img src="https://img.icons8.com/color/48/google-logo.png" width="20">

Continue with Google

</button>

<div class="divider">OR</div>

<div class="tabs">

<div class="tab active" onclick="showForm('username')">

Username

</div>

<div class="tab" onclick="showForm('phone')">

Phone

</div>

</div>

<form id="usernameForm">

<input type="text" placeholder="Username" required>

<input type="password" placeholder="Password" required>

<button class="login" onclick="loginUser()">Login</button>

</form>

<form id="phoneForm" class="hidden">

<input type="tel" placeholder="Phone Number" required>

<input type="password" placeholder="Password" required>

<a href="index.html" class="login">Login</a>

</form>

<p class="signup">

Don't have an account?

<a href="#">Sign Up</a>

</p>

</div>

<script>
    

function showForm(type){

let usernameForm=document.getElementById("usernameForm");

let phoneForm=document.getElementById("phoneForm");

let tabs=document.querySelectorAll(".tab");

tabs.forEach(tab=>tab.classList.remove("active"));

if(type==="username"){

usernameForm.classList.remove("hidden");

phoneForm.classList.add("hidden");

tabs[0].classList.add("active");

}

else{

phoneForm.classList.remove("hidden");

usernameForm.classList.add("hidden");

tabs[1].classList.add("active");

}

}
function loginUser(){

window.location.href = "index.html";

}

</script>

</body>
</html>
