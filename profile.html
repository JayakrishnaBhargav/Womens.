<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EmpowerHer Profile</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(135deg,#020617,#0f172a,#1e1b4b);
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.profile-card{

width:420px;

background:rgba(255,255,255,0.05);

backdrop-filter:blur(15px);

padding:40px;

border-radius:20px;

text-align:center;

box-shadow:0 0 30px rgba(0,0,0,0.5);

}

.profile-img{

width:100px;
height:100px;

border-radius:50%;

background:#a855f7;

display:flex;
align-items:center;
justify-content:center;

font-size:40px;

margin:auto;

margin-bottom:15px;

}

h2{

margin-bottom:10px;

}

p{

color:#ccc;

margin-bottom:10px;

}

.info{

margin-top:20px;

text-align:left;

}

.info div{

background:#111827;

padding:10px;

border-radius:8px;

margin:10px 0;

}

button{

margin-top:20px;

padding:12px 20px;

border:none;

border-radius:8px;

background:linear-gradient(45deg,#6366f1,#a855f7);

color:white;

cursor:pointer;

font-weight:bold;

transition:0.3s;

}

button:hover{

transform:scale(1.05);

box-shadow:0 0 15px #a855f7;

}

</style>
</head>

<body>

<div class="profile-card">

<div class="profile-img" id="avatar">U</div>

<h2 id="name">User Name</h2>

<p id="email">user@email.com</p>

<div class="info">

<div>📱 Phone: <span id="phone">9876543210</span></div>

<div>🎓 Tests Completed: 5</div>

<div>🏆 Certificates: 2</div>

</div>

<button onclick="logout()">Logout</button>

</div>

<script>

let user = {

name:"Demo User",
email:"demo@email.com",
phone:"9876543210"

};

document.getElementById("name").innerText=user.name;
document.getElementById("email").innerText=user.email;
document.getElementById("phone").innerText=user.phone;
document.getElementById("avatar").innerText=user.name.charAt(0);

function logout(){

alert("Logged out successfully");

window.location.href="login.html";

}

</script>

</body>
</html>
